<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app_title">NVIDIA GPU Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥</text></svg>">
  <script>
    (function() {
      var m = document.cookie.match(/(?:^|; )theme=([^;]*)/);
      var t = m ? decodeURIComponent(m[1]) : null;
      if (t === "dark" || t === "light") {
        document.documentElement.setAttribute("data-theme", t);
      } else {
        document.documentElement.removeAttribute("data-theme");
      }
    })();
  </script>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="nvidia-logo">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.948 8.798v-1.43a6.7 6.7 0 0 1 .424-.018c3.922-.124 6.493 3.374 6.493 3.374s-2.774 3.851-5.75 3.851c-.398 0-.787-.062-1.158-.185v-4.346c1.528.185 1.837.857 2.747 2.385l2.04-1.714s-1.492-1.952-4-1.952a6.016 6.016 0 0 0-.796.035m0-4.735v2.138l.424-.027c5.45-.185 9.01 4.47 9.01 4.47s-4.08 4.964-8.33 4.964c-.37 0-.733-.035-1.095-.097v1.325c.3.035.61.062.91.062 3.957 0 6.82-2.023 9.593-4.408.459.371 2.34 1.263 2.73 1.652-2.633 2.208-8.772 3.984-12.253 3.984-.335 0-.653-.018-.971-.053v1.864H24V4.063zm0 10.326v1.131c-3.657-.654-4.673-4.46-4.673-4.46s1.758-1.944 4.673-2.262v1.237H8.94c-1.528-.186-2.73 1.245-2.73 1.245s.68 2.412 2.739 3.11M2.456 10.9s2.164-3.197 6.5-3.533V6.201C4.153 6.59 0 10.653 0 10.653s2.35 6.802 8.948 7.42v-1.237c-4.84-.6-6.492-5.936-6.492-5.936z"/>
        </svg>
      </div>
      <h1><span>NVIDIA</span> <span data-i18n="header_title">GPU Dashboard</span></h1>
    </div>
    <div class="header-right">
      <div class="driver-info">
        <div>
          <span class="label" data-i18n="driver_version_label">Driver</span>
          <span class="value" id="driver-version">--</span>
        </div>
        <div>
          <span class="label" data-i18n="cuda_version_label">CUDA Version</span>
          <span class="value" id="cuda-version">--</span>
        </div>
        <div>
          <span class="label" data-i18n="device_count_label">Devices</span>
          <span class="value" id="gpu-count">--</span>
        </div>
      </div>
      <button class="settings-btn" onclick="openSettingsModal()" data-i18n-title="settings" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
      </button>
      <div class="status-dot"></div>
      <div class="refresh-info" id="last-update" data-i18n="connecting">Connecting...</div>
    </div>
  </header>

  <main class="container" id="gpu-container">
    <div class="loading">
      <div class="spinner"></div>
      <div data-i18n="loading_gpu_info">Loading GPU information...</div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-left">
      <span class="footer-version">v1.3.0</span>
    </div>
    <div class="footer-right">
      <span class="footer-author">EdwardWu (@bluehomewu)</span>
      <a class="footer-github" href="https://github.com/bluehomewu" target="_blank" rel="noopener noreferrer" title="GitHub">
        <svg class="github-icon" viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </div>
  </footer>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal-dialog">
      <!-- Page 1: Main Settings -->
      <div class="modal-page" id="settings-page-main">
        <div class="modal-header">
          <h2 data-i18n="settings">Settings</h2>
          <button class="modal-close" onclick="closeSettingsModal()">&times;</button>
        </div>
        <div class="modal-body">
          <!-- Theme -->
          <div class="settings-section">
            <div class="settings-label" data-i18n="theme_label">Theme</div>
            <div class="settings-btn-group">
              <button class="settings-opt-btn" data-theme-btn="light" onclick="setTheme('light')">
                <span class="opt-icon">&#9728;</span>
                <span data-i18n="theme_light">Light</span>
              </button>
              <button class="settings-opt-btn" data-theme-btn="auto" onclick="setTheme('auto')">
                <span class="opt-icon">&#9881;</span>
                <span data-i18n="theme_auto">Auto</span>
              </button>
              <button class="settings-opt-btn" data-theme-btn="dark" onclick="setTheme('dark')">
                <span class="opt-icon">&#9790;</span>
                <span data-i18n="theme_dark">Dark</span>
              </button>
            </div>
          </div>
          <!-- Language -->
          <div class="settings-section">
            <div class="settings-label" data-i18n="language_label">Language</div>
            <div class="settings-btn-group">
              <button class="settings-opt-btn" data-lang-btn="auto" onclick="onLangChange('auto')">
                <span data-i18n="lang_auto">Auto</span>
              </button>
              <button class="settings-opt-btn" data-lang-btn="en" onclick="onLangChange('en')">
                <span data-i18n="lang_en">English</span>
              </button>
              <button class="settings-opt-btn" data-lang-btn="zh-TW" onclick="onLangChange('zh-TW')">
                <span data-i18n="lang_zh_tw">繁體中文</span>
              </button>
            </div>
          </div>
          <!-- Remote Hosts Entry -->
          <div class="settings-section">
            <button class="settings-nav-btn" onclick="showSettingsPage('hosts')">
              <div class="settings-nav-info">
                <div class="settings-nav-title" data-i18n="remote_hosts">Remote Hosts</div>
                <div class="settings-nav-desc" data-i18n="remote_hosts_desc">Manage remote host connections</div>
              </div>
              <span class="settings-nav-arrow">&#10095;</span>
            </button>
          </div>
        </div>
      </div>
      <!-- Page 2: Remote Host Management -->
      <div class="modal-page modal-page-right" id="settings-page-hosts">
        <div class="modal-header">
          <button class="modal-back" onclick="showSettingsPage('main')">&#10094; <span data-i18n="back">Back</span></button>
          <h2 data-i18n="remote_hosts">Remote Hosts</h2>
          <button class="modal-close" onclick="closeSettingsModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div id="host-list"></div>
          <div class="host-add-form">
            <input type="text" id="host-name-input" data-i18n-placeholder="host_name_placeholder" placeholder="Host name (e.g. Server-A)">
            <input type="text" id="host-url-input" data-i18n-placeholder="host_url_placeholder" placeholder="URL (e.g. http://192.168.1.100:5000)">
            <button class="host-add-btn" onclick="addHost()" data-i18n="add_btn">Add</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
